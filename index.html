<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinâmica de Marca · Polen</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#fff;color:#111;min-height:100vh}
.wrap{max-width:680px;margin:0 auto;padding:2rem 1.25rem}
.screen{display:none}
.screen.active{display:block}

.progress-wrap{display:flex;align-items:center;gap:12px;margin-bottom:2.5rem}
.progress-bar{flex:1;height:2px;background:#e5e5e5;border-radius:1px;overflow:hidden}
.progress-fill{height:100%;background:#111;border-radius:1px;transition:width 0.5s ease}
.progress-pct{font-size:12px;color:#888;min-width:32px;text-align:right}

.tag{font-size:11px;letter-spacing:.08em;color:#888;text-transform:uppercase;margin-bottom:.75rem}
.title{font-size:26px;font-weight:600;margin-bottom:.5rem;line-height:1.2}
.sub{font-size:14px;color:#555;margin-bottom:2rem;line-height:1.65;max-width:520px}

.legend{display:flex;gap:1.5rem;margin-bottom:.75rem}
.li{display:flex;align-items:center;gap:6px;font-size:12px;color:#888}
.dot{width:9px;height:9px;border-radius:50%}
.dy{background:#111}
.dn{border:1.5px solid #999}

.counter{font-size:12px;color:#888;margin-bottom:1.25rem;min-height:18px}
.counter b{color:#111;font-weight:600}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:9px;margin-bottom:2rem}
.wc{
  padding:11px 14px;border-radius:8px;border:1px solid #e0e0e0;
  background:#fff;cursor:pointer;font-size:13px;color:#777;
  text-align:center;transition:all .13s;user-select:none;
  line-height:1.35;min-height:48px;display:flex;align-items:center;justify-content:center
}
.wc:hover{border-color:#aaa;color:#333}
.wc.yes{border-color:#111;border-width:1.5px;color:#111;font-weight:600;background:#fff}
.wc.no{border-color:#ccc;background:#f7f7f7;color:#aaa;text-decoration:line-through}

.actions{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.btn{padding:11px 24px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#111;font-size:14px;cursor:pointer;transition:background .1s;font-family:inherit}
.btn:hover{background:#f5f5f5}
.btn-fill{background:#111;color:#fff;border-color:#111}
.btn-fill:hover{background:#333}

.field-wrap{margin-bottom:2rem}
.field-wrap label{display:block;font-size:11px;letter-spacing:.07em;color:#888;text-transform:uppercase;margin-bottom:8px}
.field-wrap input, .field-wrap textarea{padding:11px 14px;border-radius:8px;border:1px solid #ccc;font-size:15px;font-family:inherit;width:100%;color:#111}
.field-wrap textarea{height:100px;resize:vertical}
.field-wrap input:focus, .field-wrap textarea:focus{outline:none;border-color:#111}

.final-msg{text-align:center;padding:4rem 1rem}
.final-msg h2{font-size:24px;font-weight:600;margin-bottom:1rem}
.final-msg p{color:#555;font-size:16px}
</style>
</head>
<body>
<div class="wrap">

<div id="s-intro" class="screen active">
  <div class="tag">dinâmica de marca · Polen</div>
  <div class="title">Qual é a cara da Polen?</div>
  <p style="font-size:14px;color:#555;margin-bottom:2rem;line-height:1.6">Três rodadas de escolha rápida. Você vai ver palavras e decidir: combina com a Polen ou não combina. No final, você poderá adicionar informações extras.</p>
  <div class="field-wrap">
    <label>Seu nome</label>
    <input type="text" id="user-name" placeholder="Ex: Ana Lima" />
  </div>
  <button class="btn btn-fill" onclick="startGame()">Começar dinâmica</button>
</div>

<div id="s-game" class="screen">
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
    <div class="progress-pct" id="pct">0%</div>
  </div>
  <div class="tag" id="r-tag"></div>
  <div class="title" id="r-title"></div>
  <div class="sub" id="r-sub"></div>
  <div class="legend">
    <div class="li"><div class="dot dy"></div>combina</div>
    <div class="li"><div class="dot dn"></div>não combina</div>
  </div>
  <div class="counter" id="counter"></div>
  <div class="grid" id="grid"></div>
  
  <div id="extra-field" class="field-wrap" style="display:none">
    <label>Quer adicionar alguma informação que acredite ser relevante?</label>
    <textarea id="user-obs" placeholder="Escreva aqui sua percepção adicional..."></textarea>
  </div>

  <div class="actions">
    <button class="btn btn-fill" id="btn-next" onclick="next()">Próxima rodada</button>
  </div>
</div>

<div id="s-result" class="screen">
  <div class="final-msg">
    <h2>Obrigada pelo envio das informações.</h2>
    <p>Agora é com a gente!</p>
  </div>
</div>

</div>
<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxKvdIyB7RtNrngoFbBYkepQcM-Mq-MJMxSTngV5iUHoZXxJcSmKkxrXvhUrEglPjFSAg/exec';

const R=[
  {id:1,title:"Personalidade",
   sub:"Como você quer que o mercado perceba a Polen?",
   words:["Confiável","Técnica","Referência","Tecnológica","Responsiva","Protagonista","Calorosa","Acessível","Pioneira","Sustentável","Parceira","Especialista","Transformadora","Humanizada","Transparente","Ousada","Inovadora","Sólida"]},
  {id:2,title:"Propósito",
   sub:"O que define o DNA da Polen? O que faz parte da nossa essência.",
   words:["Circularidade","Impacto Sistêmico","Impacto mensurável","Logística reversa","Comunidade","Parceria","Impacto Social","Compliance","Transformação","Acordo Setorial","Inclusão","Meio ambiente","ESG","Economia circular"]},
  {id:3,title:"Comunicação",
   sub:"Como a Polen deve falar? Qual tom é a cara da marca.",
   words:["Didática","Acessível","Provocadora","Ágil","Clara","Consistente","Direta","Próxima","Simples","Inspiradora","Assertiva","Empática","Otimista","Engajadora","Acolhedora","Impactante"]}
];

let st={name:"",round:0,votes:{},obs:""};

function startGame(){
  st.name=document.getElementById('user-name').value.trim()||"Participante";
  st.round=0; st.votes={};
  R.forEach(r=>{st.votes[r.id]={};});
  show('s-game'); renderRound();
}

function show(id){['s-intro','s-game','s-result'].forEach(s=>document.getElementById(s).classList.toggle('active',s===id));}

function renderRound(){
  const r=R[st.round];
  const p=Math.round((st.round/R.length)*100);
  document.getElementById('progress').style.width=p+'%';
  document.getElementById('pct').textContent=p+'%';
  document.getElementById('r-tag').textContent=`Rodada ${st.round + 1} de 3`;
  document.getElementById('r-title').textContent=r.title;
  document.getElementById('r-sub').textContent=r.sub;
  
  // Campo extra aparece apenas na última rodada
  document.getElementById('extra-field').style.display = (st.round === R.length-1) ? 'block' : 'none';
  document.getElementById('btn-next').textContent = st.round===R.length-1 ? 'Finalizar e Enviar' : 'Próxima rodada';
  
  renderGrid(r); updateCtr(r);
}

function renderGrid(r){
  const g=document.getElementById('grid'); g.innerHTML='';
  r.words.forEach(w=>{
    const v=st.votes[r.id][w];
    const el=document.createElement('div');
    el.className='wc'+(v==='yes'?' yes':v==='no'?' no':'');
    el.textContent=w; el.onclick=()=>toggle(r.id,w,el,r); g.appendChild(el);
  });
}

function toggle(rid,w,el,r){
  const cur=st.votes[rid][w];
  const nx=!cur?'yes':cur==='yes'?'no':null;
  if(nx)st.votes[rid][w]=nx;else delete st.votes[rid][w];
  el.className='wc'+(nx==='yes'?' yes':nx==='no'?' no':'');
  updateCtr(r);
}

function updateCtr(r){
  const v=st.votes[r.id];
  const y=Object.values(v).filter(x=>x==='yes').length;
  const n=Object.values(v).filter(x=>x==='no').length;
  document.getElementById('counter').innerHTML='<b>'+y+'</b> combinam · <b>'+n+'</b> não combinam';
}

function next(){
  if(st.round<R.length-1){
    st.round++; renderRound();
  } else {
    sendData();
  }
}

function sendData(){
  st.obs = document.getElementById('user-obs').value;
  const ay=R.flatMap(r=>Object.entries(st.votes[r.id]).filter(([,v])=>v==='yes').map(([w])=>w));
  const an=R.flatMap(r=>Object.entries(st.votes[r.id]).filter(([,v])=>v==='no').map(([w])=>w));

  // Envia para o Sheets via POST
  fetch(SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      nome: st.name,
      combina: ay,
      nao_combina: an,
      observacao: st.obs
    })
  });
  show('s-result');
}
</script>
</body>
</html>
